<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
        <title>テスト</title>
        <style>
            :root {
                --g: rgba(255,255,255,.04);
                --gb: rgba(255,255,255,.10);
                --gh: rgba(255,255,255,.07);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                cursor: default;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                background: #080808;
                color: #fff;
                font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
                overflow-x: hidden;
                min-height: 100vh;
            }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 1;
                background-image: linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
                background-size: 60px 60px;
            }

            body::after {
                content: '';
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 2;
                background: radial-gradient(ellipse 80% 55% at 50% 0%,rgba(255,255,255,.03),transparent 70%);
            }

            /* SPLASH */
            #splash {
                position: fixed;
                inset: 0;
                background: #080808;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition: opacity .6s ease,transform .6s ease;
            }

            #splash.hide {
                opacity: 0;
                pointer-events: none;
                transform: scale(1.04);
            }

            .sp-logo {
                font-size: clamp(28px,6vw,52px);
                font-weight: 900;
                letter-spacing: -.03em;
                margin-bottom: 16px;
            }

            .sp-cursor {
                display: inline-block;
                width: 3px;
                height: 1em;
                background: white;
                margin-left: 3px;
                vertical-align: middle;
                animation: _bc .7s infinite;
            }

            .sp-sub {
                font-size: 13px;
                opacity: 0;
                letter-spacing: .2em;
                transition: opacity .5s;
            }

            .sp-bar-wrap {
                width: 200px;
                height: 2px;
                background: rgba(255,255,255,.1);
                border-radius: 100px;
                margin-top: 24px;
                overflow: hidden;
            }

            .sp-bar {
                height: 100%;
                background: #fff;
                border-radius: 100px;
                width: 0;
                transition: width .05s linear;
            }

            @keyframes _bc {
                0%,100% {
                    opacity: 1
                }

                50% {
                    opacity: 0
                }
            }

            @keyframes _fu {
                from {
                    opacity: 0;
                    transform: translateY(34px)
                }

                to {
                    opacity: 1;
                    transform: translateY(0)
                }
            }

            @keyframes _fi {
                from {
                    opacity: 0
                }

                to {
                    opacity: 1
                }
            }

            @keyframes _sh {
                0% {
                    background-position: -200% center
                }

                100% {
                    background-position: 200% center
                }
            }

            @keyframes _pr {
                0%,100% {
                    box-shadow: 0 0 0 0 rgba(255,255,255,.1)
                }

                50% {
                    box-shadow: 0 0 0 14px rgba(255,255,255,0)
                }
            }

            @keyframes _ap {
                0%,100% {
                    opacity: .8
                }

                50% {
                    opacity: 1
                }
            }

            @keyframes _fl {
                0%,100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-16px)
                }
            }

            .rv {
                opacity: 0;
                transform: translateY(34px);
            }

            .rv.in {
                animation: _fu .85s cubic-bezier(.16,1,.3,1) forwards;
            }

            .cd {
                background: var(--g);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border: 1px solid var(--gb);
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.09);
                transition: all .4s cubic-bezier(.16,1,.3,1);
            }

            .cd:hover {
                transform: translateY(-4px);
                background: var(--gh);
                border-color: rgba(255,255,255,.18);
            }

            .cd-a {
                background: rgba(255,255,255,.055)!important;
                border-color: rgba(255,255,255,.22)!important;
            }

            .bg {
                background: rgba(255,255,255,.07);
                backdrop-filter: blur(18px);
                border: 1px solid rgba(255,255,255,.17);
                color: #fff;
                border-radius: 100px;
                padding: 8px 18px;
                font-size: 12px;
                letter-spacing: .07em;
                transition: all .3s ease;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-family: inherit;
                white-space: nowrap;
            }

            .bg:hover {
                background: rgba(255,255,255,.14);
                border-color: rgba(255,255,255,.36);
                transform: translateY(-2px);
            }

            .bg.act {
                background: rgba(255,255,255,.18);
                border-color: rgba(255,255,255,.5);
            }

            .bw {
                background: #fff;
                color: #000;
                border: none;
                border-radius: 100px;
                padding: 10px 24px;
                font-size: 12px;
                letter-spacing: .1em;
                font-weight: 700;
                animation: _pr 3s ease-in-out infinite;
                transition: all .3s cubic-bezier(.16,1,.3,1);
                cursor: pointer;
                font-family: inherit;
            }

            .bw:hover {
                background: rgba(255,255,255,.88);
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 12px 40px rgba(255,255,255,.2);
            }

            .sm {
                background: linear-gradient(90deg,#fff 0%,#fff 36%,rgba(255,255,255,.3) 50%,#fff 64%,#fff 100%);
                background-size: 200% auto;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: _sh 4.5s linear infinite;
            }

            /* NAV */
            nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 200;
                padding: 14px 24px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-bottom: 1px solid rgba(255,255,255,.06);
            }

            .nv-r {
                display: flex;
                align-items: center;
                gap: 7px;
                flex-wrap: wrap;
            }

            #logo-txt {
                font-size: 13px;
                font-weight: 900;
                letter-spacing: .1em;
                white-space: nowrap;
                transition: opacity .2s,transform .2s;
                display: inline-block;
            }

            /* TABS */
            .tabs {
                display: flex;
                gap: 4px;
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.08);
                border-radius: 100px;
                padding: 4px;
            }

            .tab {
                padding: 6px 14px;
                border-radius: 100px;
                font-size: 11px;
                letter-spacing: .07em;
                cursor: pointer;
                transition: all .25s;
                color: rgba(255,255,255,.5);
                border: none;
                background: none;
                font-family: inherit;
            }

            .tab:hover {
                color: #fff;
                background: rgba(255,255,255,.06);
            }

            .tab.on {
                background: rgba(255,255,255,.14);
                color: #fff;
                border: 1px solid rgba(255,255,255,.22);
            }

            /* PAGE TRANSITION */
            .page {
                display: none;
                min-height: 100vh;
                padding-top: 70px;
                animation: _fi .4s ease;
            }

            .page.on {
                display: block;
            }

            /* HERO */
            .hero {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                min-height: calc(100vh - 70px);
                padding: 0 24px 40px;
            }

            .hl {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                animation: _fi 1s ease forwards;
                opacity: 0;
                animation-delay: .1s;
                margin-bottom: 20px;
            }

            .hln {
                width: 36px;
                height: 1px;
                background: rgba(255,255,255,.22);
            }

            .hh1 {
                font-size: clamp(48px,11vw,108px);
                font-weight: 900;
                letter-spacing: -.035em;
                line-height: 1.04;
                margin-bottom: 16px;
                animation: _fu 1s cubic-bezier(.16,1,.3,1) forwards;
                opacity: 0;
                animation-delay: .3s;
            }

            .hbt {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                justify-content: center;
                animation: _fu 1s cubic-bezier(.16,1,.3,1) forwards;
                opacity: 0;
                animation-delay: .7s;
            }

            /* LAYOUT */
            .sw {
                padding: 56px 24px;
                max-width: 880px;
                margin: 0 auto;
            }

            .sww {
                padding: 56px 24px;
                max-width: 1100px;
                margin: 0 auto;
            }

            .sh {
                text-align: center;
                margin-bottom: 44px;
            }

            .sl {
                font-size: 11px;
                letter-spacing: .3em;
                opacity: .35;
                margin-bottom: 10px;
                text-transform: uppercase;
            }

            .st {
                font-size: clamp(26px,5vw,46px);
                font-weight: 900;
                letter-spacing: -.03em;
            }

            /* STATS */
            .sg {
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(165px,1fr));
                gap: 12px;
            }

            .sn {
                font-size: clamp(30px,5vw,42px);
                font-weight: 900;
                letter-spacing: -.03em;
                margin-bottom: 4px;
            }

            .slb {
                font-size: 11px;
                opacity: .35;
                letter-spacing: .12em;
            }

            /* SHOP */
            .shl {
                display: flex;
                gap: 24px;
                flex-wrap: wrap;
                align-items: flex-start;
            }

            .shp-l {
                flex: 1;
                min-width: 220px;
            }

            .shp-b {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(255,255,255,.08);
                border: 1px solid rgba(255,255,255,.14);
                padding: 6px 14px;
                border-radius: 100px;
                font-size: 12px;
                letter-spacing: .1em;
                margin-bottom: 18px;
            }

            .shp-t {
                font-size: clamp(18px,3vw,28px);
                font-weight: 900;
                letter-spacing: -.02em;
                margin-bottom: 10px;
                line-height: 1.38;
            }

            .shp-d {
                font-size: 13px;
                opacity: .46;
                line-height: 1.92;
                margin-bottom: 20px;
            }

            .shp-pts {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 24px;
            }

            .shp-pt {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .pdw {
                width: 17px;
                height: 17px;
                border-radius: 50%;
                background: rgba(255,255,255,.07);
                border: 1px solid rgba(255,255,255,.16);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }

            .pd {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: #fff;
            }

            .rbox {
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.09);
                border-radius: 14px;
                padding: 18px 20px;
            }

            .rrow {
                display: flex;
                gap: 14px;
                margin-bottom: 9px;
                flex-wrap: wrap;
            }

            .rdot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
            }

            .rtxt {
                font-size: 12px;
                opacity: .72;
            }

            .rbg {
                height: 6px;
                border-radius: 100px;
                background: rgba(255,255,255,.09);
                overflow: hidden;
            }

            .rb {
                height: 100%;
                background: linear-gradient(90deg,rgba(255,255,255,.92),rgba(255,255,255,.48));
                border-radius: 100px;
                width: 0;
                transition: width 1.3s cubic-bezier(.16,1,.3,1) .3s;
            }

            .shp-c {
                width: clamp(100px,16vw,140px);
                height: clamp(100px,16vw,140px);
                border-radius: 50%;
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.09);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                box-shadow: 0 0 50px rgba(255,255,255,.04);
            }

            .shp-r {
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* MEMBER GRAPH */
            .mg-wrap {
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.09);
                border-radius: 14px;
                padding: 24px;
            }

            .mg-title {
                font-size: 12px;
                letter-spacing: .2em;
                opacity: .4;
                text-transform: uppercase;
                margin-bottom: 20px;
            }

            .mg-bars {
                display: flex;
                align-items: flex-end;
                gap: 10px;
                height: 120px;
            }

            .mg-bar-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                flex: 1;
                gap: 6px;
            }

            .mg-bar {
                width: 100%;
                border-radius: 6px 6px 0 0;
                background: rgba(255,255,255,.15);
                position: relative;
                transition: height 1.2s cubic-bezier(.16,1,.3,1);
                min-width: 30px;
            }

            .mg-bar-hi {
                background: linear-gradient(to top,rgba(255,255,255,.5),rgba(255,255,255,.9));
            }

            .mg-bar-val {
                font-size: 10px;
                font-weight: 700;
                opacity: .7;
            }

            .mg-bar-lbl {
                font-size: 9px;
                opacity: .4;
                text-align: center;
                letter-spacing: .05em;
            }

            /* ADMIN */
            .ag {
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(210px,1fr));
                gap: 14px;
            }

            .ai {
                padding: 26px;
            }

            .aaw {
                position: relative;
                margin-bottom: 14px;
            }

            .aa {
                width: 52px;
                height: 52px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 17px;
                font-weight: 900;
            }

            .ab {
                position: absolute;
                bottom: -2px;
                right: -2px;
                width: 19px;
                height: 19px;
                border-radius: 50%;
                background: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                animation: _ap 2.5s ease-in-out infinite;
            }

            .an {
                font-size: 17px;
                font-weight: 900;
                margin-bottom: 4px;
            }

            .art {
                display: inline-block;
                font-size: 10px;
                letter-spacing: .12em;
                padding: 3px 10px;
                border-radius: 100px;
                margin-bottom: 10px;
            }

            .ad {
                font-size: 13px;
                opacity: .52;
                line-height: 1.88;
            }

            /* VOICES */
            .vg {
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(190px,1fr));
                gap: 11px;
            }

            .vi {
                padding: 20px;
            }

            .vh {
                display: flex;
                align-items: center;
                gap: 9px;
                margin-bottom: 11px;
            }

            .va {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 700;
                flex-shrink: 0;
            }

            .va-n {
                background: rgba(255,255,255,.07);
                border: 1px solid rgba(255,255,255,.13);
            }

            .va-a {
                background: rgba(255,255,255,.14);
                border: 1px solid rgba(255,255,255,.4);
            }

            .vn {
                font-size: 13px;
                font-weight: 700;
            }

            .vr {
                font-size: 10px;
                opacity: .35;
            }

            .vt {
                font-size: 12px;
                opacity: .54;
                line-height: 1.88;
                margin-top: 9px;
            }

            /* RULES */
            .rg {
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(270px,1fr));
                gap: 12px;
            }

            .ri {
                padding: 22px;
            }

            .rnum {
                font-size: 26px;
                font-weight: 900;
                opacity: .12;
                letter-spacing: -.03em;
                margin-bottom: 7px;
            }

            .rtt {
                font-size: 14px;
                font-weight: 900;
                margin-bottom: 9px;
            }

            .rit {
                display: flex;
                flex-direction: column;
                gap: 7px;
            }

            .rii {
                display: flex;
                gap: 7px;
                align-items: flex-start;
            }

            .rbu {
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: rgba(255,255,255,.4);
                flex-shrink: 0;
                margin-top: 7px;
            }

            .rtc {
                font-size: 12px;
                opacity: .55;
                line-height: 1.75;
            }

            .anote {
                margin-top: 22px;
                background: rgba(255,255,255,.03);
                border: 1px solid rgba(255,255,255,.09);
                border-radius: 13px;
                padding: 18px 20px;
            }

            /* FAQ */
            .fl {
                display: flex;
                flex-direction: column;
                gap: 9px;
            }

            .fi {
                border-radius: 13px;
                overflow: hidden;
                border: 1px solid var(--gb);
                background: var(--g);
                backdrop-filter: blur(20px);
            }

            .fq {
                width: 100%;
                background: none;
                border: none;
                color: #fff;
                padding: 16px 18px;
                font-size: 13px;
                font-weight: 700;
                text-align: left;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                font-family: inherit;
                cursor: pointer;
            }

            .fq:hover {
                background: rgba(255,255,255,.04);
            }

            .fa-arr {
                font-size: 11px;
                opacity: .5;
                transition: transform .3s;
                flex-shrink: 0;
            }

            .fa-arr.op {
                transform: rotate(180deg);
            }

            .fa {
                font-size: 13px;
                color: rgba(255,255,255,.56);
                line-height: 1.9;
                padding: 0 18px;
                max-height: 0;
                overflow: hidden;
                transition: max-height .4s cubic-bezier(.16,1,.3,1),padding .3s,opacity .3s;
                opacity: 0;
            }

            .fa.op {
                max-height: 300px;
                padding: 0 18px 16px;
                opacity: 1;
            }

            /* BGM */
            .bmw {
                padding: 36px 24px;
                max-width: 680px;
                margin: 0 auto;
            }

            .bmc {
                padding: 22px 26px;
            }

            .bmt {
                display: flex;
                flex-direction: column;
                gap: 9px;
                margin-bottom: 18px;
            }

            .bmi {
                display: flex;
                align-items: center;
                gap: 11px;
                padding: 11px 13px;
                border-radius: 10px;
                border: 1px solid transparent;
                cursor: pointer;
                transition: all .25s;
                background: rgba(255,255,255,.03);
            }

            .bmi:hover {
                background: rgba(255,255,255,.07);
                border-color: rgba(255,255,255,.12);
            }

            .bmi.on {
                background: rgba(255,255,255,.09);
                border-color: rgba(255,255,255,.22);
            }

            .bmd {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: rgba(255,255,255,.3);
                flex-shrink: 0;
                transition: all .25s;
            }

            .bmi.on .bmd {
                background: #fff;
            }

            .bpw {
                border-radius: 11px;
                overflow: hidden;
                border: 1px solid rgba(255,255,255,.1);
            }

            .bpw iframe {
                display: block;
                width: 100%;
                border: none;
            }

            /* CTA */
            .ctac {
                max-width: 540px;
                margin: 0 auto;
            }

            .ctai {
                padding: clamp(30px,6vw,60px) clamp(18px,4vw,48px);
                text-align: center;
            }

            /* HISTORY TIMELINE */
            .tl {
                position: relative;
                padding-left: 32px;
            }

            .tl::before {
                content: '';
                position: absolute;
                left: 8px;
                top: 0;
                bottom: 0;
                width: 1px;
                background: linear-gradient(to bottom,rgba(255,255,255,.3),rgba(255,255,255,.05));
            }

            .te {
                position: relative;
                margin-bottom: 34px;
            }

            .te::before {
                content: '';
                position: absolute;
                left: -28px;
                top: 6px;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: #fff;
                box-shadow: 0 0 12px rgba(255,255,255,.4);
            }

            .te.crisis::before {
                background: rgba(255,120,120,.9);
                box-shadow: 0 0 12px rgba(255,100,100,.5);
            }

            .te.milestone::before {
                background: rgba(255,255,255,1);
                box-shadow: 0 0 20px rgba(255,255,255,.7);
            }

            .te-date {
                font-size: 11px;
                letter-spacing: .2em;
                opacity: .4;
                margin-bottom: 6px;
                text-transform: uppercase;
            }

            .te-ttl {
                font-size: 16px;
                font-weight: 900;
                margin-bottom: 8px;
            }

            .te-txt {
                font-size: 13px;
                opacity: .55;
                line-height: 1.9;
            }

            .te-special {
                background: rgba(255,255,255,.04);
                border: 1px solid rgba(255,255,255,.1);
                border-radius: 12px;
                padding: 18px 20px;
                margin-top: 10px;
            }

            .te-tag {
                display: inline-block;
                font-size: 10px;
                letter-spacing: .15em;
                padding: 2px 10px;
                border-radius: 100px;
                background: rgba(255,255,255,.1);
                border: 1px solid rgba(255,255,255,.18);
                margin-bottom: 10px;
                text-transform: uppercase;
            }

            .te-crisis-box {
                background: rgba(255,80,80,.06);
                border: 1px solid rgba(255,100,100,.2);
                border-radius: 12px;
                padding: 16px 18px;
                margin-top: 10px;
            }

            /* STORY */
            .story-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
                gap: 16px;
            }

            .sc {
                padding: 26px;
            }

            .sc-num {
                font-size: 32px;
                font-weight: 900;
                opacity: .1;
                letter-spacing: -.03em;
                margin-bottom: 8px;
            }

            .sc-ttl {
                font-size: 15px;
                font-weight: 900;
                margin-bottom: 8px;
            }

            .sc-tag {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 10px;
                letter-spacing: .1em;
                padding: 3px 10px;
                border-radius: 100px;
                background: rgba(255,255,255,.07);
                border: 1px solid rgba(255,255,255,.13);
                margin-bottom: 12px;
            }

            .sc-desc {
                font-size: 13px;
                opacity: .52;
                line-height: 1.85;
                margin-bottom: 16px;
            }

            .sc-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 9px 18px;
                border-radius: 100px;
                background: rgba(255,255,255,.08);
                border: 1px solid rgba(255,255,255,.16);
                font-size: 12px;
                color: #fff;
                text-decoration: none;
                transition: all .25s;
            }

            .sc-btn:hover {
                background: rgba(255,255,255,.16);
                border-color: rgba(255,255,255,.32);
                transform: translateY(-2px);
            }

            #wc {
                position: fixed;
                top: 0;
                left: 0;
                pointer-events: none;
                z-index: 5;
            }

            @media(max-width: 600px) {
                nav {
                    padding:11px 13px;
                }

                .nv-r {
                    gap: 5px;
                }

                .bg {
                    padding: 6px 10px;
                    font-size: 11px;
                }

                .tabs {
                    gap: 2px;
                }

                .tab {
                    padding: 5px 9px;
                    font-size: 10px;
                }

                .sw,.sww {
                    padding: 44px 14px;
                }
            }
        </style>
    </head>
    <body>
        <!-- SPLASH -->
        <div id="splash">
            <div class="sp-logo">
                <span id="sp-txt"></span>
                <span class="sp-cursor" id="sp-cur"></span>
            </div>
            <div class="sp-sub" id="sp-sub">Discord Community</div>
            <div class="sp-bar-wrap">
                <div class="sp-bar" id="sp-bar"></div>
            </div>
        </div>
        <canvas id="wc"></canvas>
        <nav>
            <span id="logo-txt"どいひ</span>
            <div class="nv-r">
                <div class="tabs" id="tabs">
                </div>
                <button class="bg" onclick="cw()" id="wb">
                    <span id="wi">☀️</span>
                    <span id="wl">晴れ</span>
                </button>
                <button class="bg" onclick="tlng()" id="lb">EN</button>
                <button class="bw" onclick="window.open(_x(),'_blank')" id="nb">参加する</button>
            </div>
        </nav>
        <!-- ══ PAGE: HOME ══ -->
        <div class="page on" id="pg-home">
            <section class="hero">
                <div class="hl">
                    <div class="hln"></div>
                    <span style="font-size:11px;letter-spacing:.3em;opacity:.38;text-transform:uppercase">Discord Community</span>
                    <div class="hln"></div>
                </div>
                <h1 class="hh1 sm" id="hh1">
                    どいひ<br>
                  </h1>
        </div>
        <script>
   

            // ── SPLASH (typing effect) ────────────────────────────────────────
            (function() {
                var txt = 'どいひ'
                  , el = document.getElementById('sp-txt')
                  , bar = document.getElementById('sp-bar')
                  , sub = document.getElementById('sp-sub')
                  , splash = document.getElementById('splash')
                  , i = 0;
                function type() {
                    if (i <= txt.length) {
                        el.textContent = txt.slice(0, i);
                        i++;
                        bar.style.width = (i / txt.length * 70) + '%';
                        setTimeout(type, 80);
                    } else {
                        sub.style.opacity = '1';
                        var p = 70
                          , iv = setInterval(function() {
                            p = Math.min(p + 3, 100);
                            bar.style.width = p + '%';
                            if (p >= 100) {
                                clearInterval(iv);
                                setTimeout(function() {
                                    splash.classList.add('hide');
                                }, 400);
                            }
                        }, 20);
                    }
                }
                setTimeout(type, 300);
            }
            )();


            // ── Lang ──────────────────────────────────────────────────────────
            var _lang = 'ja';
            function tlng() {
                _lang = _lang === 'ja' ? 'en' : 'ja';
                document.getElementById('lb').textContent = _lang === 'ja' ? 'EN' : '日本語';
                document.getElementById('nb').textContent = _lang === 'ja' ? '参加する' : 'Join';
                document.documentElement.lang = _lang;
                document.querySelectorAll('[data-j][data-e]').forEach(function(el) {
                    var v = el.getAttribute('data-' + (_lang === 'ja' ? 'j' : 'e'));
                    if (v !== null)
                        el.innerHTML = v;
                });
                document.getElementById('hh1').innerHTML = _lang === 'ja' ? 'おいしい<br>コミュニティ' : 'Oishii<br>Community';
                _uwl();
            }

            // ── Logo flip ─────────────────────────────────────────────────────
            var _ll = ['どいひ', 'どいひ']
              , _li = 0
              , _lt = document.getElementById('logo-txt');
            setInterval(function() {
                _lt.style.opacity = '0';
                _lt.style.transform = 'translateY(-7px)';
                setTimeout(function() {
                    _li = (_li + 1) % _ll.length;
                    _lt.textContent = _ll[_li];
                    _lt.style.opacity = '1';
                    _lt.style.transform = 'translateY(0)';
                }, 220);
            }, 3500);

            // ── Reveal ────────────────────────────────────────────────────────
            var _ro = new IntersectionObserver(function(es) {
                es.forEach(function(e) {
                    if (e.isIntersecting)
                        e.target.classList.add('in');
                });
            }
            ,{
                threshold: 0.08
            });
            document.querySelectorAll('.rv').forEach(function(el) {
                _ro.observe(el);
            });

            // ── Ratio bar ─────────────────────────────────────────────────────
            var _rbo = new IntersectionObserver(function(es) {
                es.forEach(function(e) {
                    if (e.isIntersecting)
                        document.getElementById('rbar').style.width = '60%';
                });
            }
            ,{
                threshold: 0.2
            });
            var _se = document.getElementById('s-shop');
            if (_se)
                _rbo.observe(_se);

            // ── Count-up ──────────────────────────────────────────────────────
            var _cd = false;
            function _ac(id, target, sfx, dur) {
                var el = document.getElementById(id)
                  , s = 0
                  , step = Math.ceil(target / (dur / 16));
                var t = setInterval(function() {
                    s = Math.min(s + step, target);
                    el.textContent = s + sfx;
                    if (s >= target)
                        clearInterval(t);
                }, 16);
            }
            var _co = new IntersectionObserver(function(es) {
                es.forEach(function(e) {
                    if (e.isIntersecting && !_cd) {
                        _cd = true;
                        _ac('c-deals', 40, '+', 1200);
                        _ac('c-mem', 100, '+', 1400);
                        _ac('c-sat', 98, '%', 1300);
                        var r = 0
                          , rt = setInterval(function() {
                            r = Math.min(+(r + .1).toFixed(1), 5);
                            document.getElementById('c-rat').textContent = r.toFixed(1);
                            if (r >= 5)
                                clearInterval(rt);
                        }, 25);
                    }
                });
            }
            ,{
                threshold: 0.3
            });
            var _ss = document.getElementById('s-stats');
            if (_ss)
                _co.observe(_ss);

            // ── FAQ ───────────────────────────────────────────────────────────
            function tf(btn) {
                var a = btn.nextElementSibling
                  , ar = btn.querySelector('.fa-arr')
                  , o = a.classList.contains('op');
                document.querySelectorAll('.fa').forEach(function(x) {
                    x.classList.remove('op');
                });
                document.querySelectorAll('.fa-arr').forEach(function(x) {
                    x.classList.remove('op');
                });
                if (!o) {
                    a.classList.add('op');
                    ar.classList.add('op');
                }
            }

            // ── Weather ───────────────────────────────────────────────────────
            var _wm = 'none'
              , _ws = ['none', 'rain', 'snow']
              , _wd = {
                none: {
                    i: '☀️',
                    j: '晴れ',
                    e: 'Clear'
                },
                rain: {
                    i: '🌧️',
                    j: '雨',
                    e: 'Rain'
                },
                snow: {
                    i: '❄️',
                    j: '雪',
                    e: 'Snow'
                }
            };
            function _uwl() {
                document.getElementById('wi').textContent = _wd[_wm].i;
                document.getElementById('wl').textContent = _wd[_wm][_lang === 'ja' ? 'j' : 'e'];
            }
            function cw() {
                _wm = _ws[(_ws.indexOf(_wm) + 1) % 3];
                _uwl();
                _iw();
            }
            var _wc = document.getElementById('wc')
              , _wct = _wc.getContext('2d')
              , _waf = null
              , _wp = [];
            function _rs() {
                _wc.width = window.innerWidth;
                _wc.height = window.innerHeight;
            }
            _rs();
            window.addEventListener('resize', _rs);
            function _iw() {
                cancelAnimationFrame(_waf);
                _wct.clearRect(0, 0, _wc.width, _wc.height);
                _wp = [];
                if (_wm === 'none')
                    return;
                if (_wm === 'rain') {
                    for (var i = 0; i < 130; i++)
                        _wp.push({
                            x: Math.random() * _wc.width,
                            y: Math.random() * _wc.height,
                            l: Math.random() * 16 + 8,
                            s: Math.random() * 7 + 10,
                            o: Math.random() * .3 + .1,
                            w: Math.random() * .7 + .3
                        });
                } else {
                    for (var i = 0; i < 90; i++)
                        _wp.push({
                            x: Math.random() * _wc.width,
                            y: Math.random() * _wc.height,
                            r: Math.random() * 3 + 1,
                            s: Math.random() * 1.1 + .4,
                            d: Math.random() * .5 - .25,
                            o: Math.random() * .45 + .15,
                            wb: Math.random() * Math.PI * 2
                        });
                }
                _dw();
            }
            function _dw() {
                _wct.clearRect(0, 0, _wc.width, _wc.height);
                if (_wm === 'rain') {
                    _wp.forEach(function(p) {
                        _wct.beginPath();
                        _wct.moveTo(p.x, p.y);
                        _wct.lineTo(p.x - p.l * .14, p.y + p.l);
                        _wct.strokeStyle = 'rgba(180,220,255,' + p.o + ')';
                        _wct.lineWidth = p.w;
                        _wct.stroke();
                        p.y += p.s;
                        p.x -= p.s * .07;
                        if (p.y > _wc.height) {
                            p.y = -p.l;
                            p.x = Math.random() * _wc.width;
                        }
                    });
                } else if (_wm === 'snow') {
                    _wp.forEach(function(p) {
                        p.wb += .018;
                        _wct.beginPath();
                        _wct.arc(p.x + Math.sin(p.wb) * 1.8, p.y, p.r, 0, Math.PI * 2);
                        _wct.fillStyle = 'rgba(255,255,255,' + p.o + ')';
                        _wct.fill();
                        p.y += p.s;
                        p.x += p.d;
                        if (p.y > _wc.height) {
                            p.y = -p.r;
                            p.x = Math.random() * _wc.width;
                        }
                        if (p.x > _wc.width)
                            p.x = 0;
                        if (p.x < 0)
                            p.x = _wc.width;
                    });
                }
                _waf = requestAnimationFrame(_dw);
            }
        </script>
    </body>
</html>
